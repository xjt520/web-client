<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2E 测试报告</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #333; font-size: 24px; margin-bottom: 10px; }
        h2 { color: #666; margin-bottom: 5px; }
        h3 { color: #999; margin-bottom: 5px; }
        .summary {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 10px;
        }
        .summary > div {
            flex: 1;
        }
        .summary-item {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            border-radius: 8px;
            background: #e8f5e8;
            color: white;
        }
        .summary-item.pass { background: #d4ed4d; }
        .summary-item.fail { background: #ff6b6b; color: #dc3545; }
        .summary-item.pending { background: #f0f0f5; }
        .summary h3 { margin: 0; color: #666; border-bottom: 1px solid #ccc;
        }
        .summary h3 { margin: 0; color: #999; border-bottom: 1px solid #999;
        }
        .section { margin-top: 20px; }
        h2 { color: #333; }
        .progress-bar {
            height: 20px;
            background: #e0e1e2;
            border-radius: 10px;
            margin-top: 10px;
        }
        .progress { width: 0%; }
    </style>
</head>
<body>
    <h1>E2E 测试报告</h1>
    <div class="container">
        <div class="summary">
            <div class="summary-item">
                <span class="status-icon">✅</span>
                <span class="label">登录/连接</span>
            </div>
            <div class="summary-item">
                <span class="status-icon">✅</span>
                <span class="label">大厅界面显示</span>
            </div>
            <div class="summary-item">
                <span class="status-icon">✅</span>
                <span class="label">设置功能</span>
            </div>
            <div class="summary-item">
                <span class="status-icon">✅</span>
                <span class="label">规则弹窗</span>
            </div>
            <div class="summary-item">
                <span class="status-icon">✅</span>
                <span class="label">个人中心</span>
            </div>
            <div class="summary-item">
                <span class="status-icon">✅</span>
                <span class="label">创建房间</span>
            </div>
            <div class="summary-item">
                <span class="status-icon">✅</span>
                <span class="label">加入房间</span>
            </div>
            <div class="summary-item">
                <span class="status-icon">✅</span>
                <span class="label">准备功能</span>
            </div>
            <div class="summary-item">
                <span class="status-icon">✅</span>
                <span class="label">随机匹配</span>
            </div>
            <div class="summary-item">
                <span class="status-icon">✅</span>
                <span class="label">游戏开始</span>
            </div>
        </div>

        <div class="timestamp">
            最后 updated: ${ new Date().toLocaleString() }
        </div>
    </div>
</body>
</html>
